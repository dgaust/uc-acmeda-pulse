services:
  uc-acmeda-pulse:
    # Prebuilt multi-arch image (amd64/x86 + arm64) published from this repo's
    # CI - no clone or build needed, this file works standalone.
    image: ghcr.io/dgaust/uc-acmeda-pulse:latest
    # To build from source instead (requires a checkout of this repo),
    # uncomment the next line and run: docker compose up -d --build
    # build: .
    container_name: uc-acmeda-pulse
    restart: unless-stopped
    # Host networking is required so the driver's mDNS advertisement
    # (_uc-integration._tcp) reaches the Remote and so it can talk to the hub
    # on the LAN. mDNS multicast does not cross a Docker bridge network.
    network_mode: host
    environment:
      # The port the Remote connects to. This is where the port is set - it is
      # deliberately NOT in driver.json, because a driver that announces a port
      # in its metadata isn't reconnected to correctly by the Remote.
      UC_INTEGRATION_HTTP_PORT: "10091"
      #
      # Optional. Only needed if the Remote has trouble finding the driver: set
      # it to this machine's LAN IP to pin the address the driver announces.
      # UC_INTEGRATION_INTERFACE: "192.168.1.50"
    volumes:
      # Persist the hub host + cached roller list across restarts/upgrades.
      - ./config:/config
